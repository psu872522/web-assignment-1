<html lang="ko">
<head>

<!--10번 문제 답-->
<form>
<fieldset>
<div>
  <h3>시작 그룹</h3>
  <input type="radio" id="newtap" name="start" value="nt">
  <label for="newtap">새 탭 페이지 열기</label><br>
  <input type="radio" id="keepgoing" name="start" value="kg">
  <label for="keepgoing">중단한 위치에서 계속하기</label><br>
  <input type="radio" id="page" name="start" value="pg">
  <label for="page">특정 페이지 또는 페이지 모음 열기</label>
</div>
<div>
  <h3>개인정보 및 보안</h3>
  <input type="checkbox" id="service" name="user" value="sv">
  <label for="service">동기화 및 서비스</label><br>
  <input type="checkbox" id="login" name="user" value="lg">
  <label for="login">로그인 허용</label><br>
  <input type="checkbox" id="lod" name="user" value="ld">
  <label for="lod">페이지 미리 로드</label>
</div>
</fieldset>
</form><br>


<!--11번 문제 답-->
<form>
<fieldset>
<table border="0">
  <tr>
    <td colspan="2">
      <h1>글 작성하기</h1>
    </td>
  </tr>
  <tr>
    <th>작성자</th>
    <td>
      <input type="text" name="user">
    </td>
  </tr>
  <tr>
    <th>아이디</th>
    <td>
      <input type="text" name="id0">
    </td>
  </tr>
  <tr>
    <th>이메일</th>
    <td>
      <input type="email" name="mail">
      <span>@</span>
      <input type="email" name="mail">
    </td>
  </tr>
  <tr>
    <th>휴대폰</th>
    <td>
    <select>
      <option>010</option>
      <option>011</option>
      <option>016</option>
      <option>017</option>
    </select>
    <span>-</span>
    <input type="text" name="number">
    <span>-</span>
    <input type="text" name="number">
    </td>
  </tr>
  <tr>
    <th>글제목</th>
    <td>
    <input type="text" name="thead">
    </td>
  </tr>
  <tr>
    <th>내용</th>
    <td>
    <textarea cols="29" rows="10"></textarea>
    </td>
  </tr>
  <tr>
    <td></td>
    <td>
      <input type="submit" name="sub" value="제출">
    </td>
  </tr>
</table>
</fieldset>
</form>

</body>
</html>
